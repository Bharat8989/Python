<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <!-- Working Tailwind CSS Play CDN Link -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- Main Wrapper Box (Matches the Login card size) -->
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md mx-4 my-8">
        
        <!-- Header Section -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Create Account</h1>
            <p class="text-gray-500 text-sm mt-2">Get started by entering your details below.</p>
        </div>

        <!-- Registration Form -->
        <form action="/register" method="POST" class="space-y-5">
            
            <!-- Username Input Field -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required placeholder="e.g. bharat123"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200">
            </div>

            <!-- Email Input Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200">
            </div>

            <!-- Mobile Number Input Field (Matches your database column) -->
            <div>
                <label for="mobile_number" class="block text-sm font-medium text-gray-700 mb-1">Mobile Number</label>
                <input type="tel" id="mobile_number" name="mobile_number" required placeholder="9876543210"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200">
            </div>

            <!-- Password Input Field -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200">
            </div>

            <!-- Terms & Conditions Checkbox -->
            <div class="flex items-center text-sm">
                <label class="flex items-center text-gray-600 cursor-pointer">
                    <input type="checkbox" required class="rounded text-blue-600 focus:ring-blue-500 mr-2 cursor-pointer">
                    I agree to the Terms & Conditions
                </label>
            </div>

            <!-- Submit Sign Up Button -->
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 shadow-sm hover:shadow focus:ring-4 focus:ring-blue-200">
                Sign Up
            </button>
        </form>

        <!-- Link Redirecting back to Login Page -->
        <div class="mt-6 text-center border-t border-gray-100 pt-5">
            <p class="text-sm text-gray-600">
                Already have an account? 
                <a href="/login" class="text-blue-600 hover:underline font-semibold ml-1">Login here</a>
            </p>
        </div>

    </div>

</body>
</html>
