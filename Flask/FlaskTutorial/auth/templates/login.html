<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Tailwind CSS Play CDN Link -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- Main Wrapper Box (auth-page / auth-card style) -->
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md mx-4">
        
        <!-- Header Section -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Login</h1>
            <p class="text-gray-500 text-sm mt-2">Welcome back! Please enter your details.</p>
        </div>

        <!-- Login Form -->
        <form action="/login" method="POST" class="space-y-6">
            
            <!-- Email Input Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200">
            </div>

            <!-- Password Input Field -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200">
            </div>

            <!-- Remember Me & Forgot Password Utilities -->
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-gray-600 cursor-pointer">
                    <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500 mr-2 cursor-pointer">
                    Remember me
                </label>
                <a href="#" class="text-blue-600 hover:underline font-medium">Forgot password?</a>
            </div>

            <!-- Submit Sign In Button -->
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 shadow-sm hover:shadow focus:ring-4 focus:ring-blue-200">
                Sign In
            </button>
        </form>

        <!-- Dynamic Link Redirecting Option to Register Page -->
        <div class="mt-8 text-center border-t border-gray-100 pt-6">
            <p class="text-sm text-gray-600">
                Don't have an account? 
                <a href="/register" class="text-blue-600 hover:underline font-semibold ml-1">Register here</a>
            </p>
        </div>

    </div>

</body>
</html>
